<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Scientific Calculator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.calculator {
  width: 100%;
  max-width: 380px;
  background: #1a1a1a;
  border-radius: 20px;
  padding: 15px;
}

.display {
  width: 100%;
  height: 70px;
  background: black;
  color: #00ffcc;
  font-size: 1.8em;
  text-align: right;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  overflow-x: auto;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

button {
  padding: 15px;
  font-size: 1em;
  border: none;
  border-radius: 10px;
  background: #333;
  color: white;
}

button:active {
  background: #555;
}

.operator { background: #ff9500; }
.equal { background: #34c759; grid-column: span 2; }
.clear { background: #ff3b30; }
.mode { background: #5856d6; }

</style>
</head>

<body>

<div class="calculator">
  <div id="display" class="display">0</div>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>
    <button onclick="append('%')">%</button>
    <button class="mode" onclick="toggleMode()" id="mode">DEG</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('/')">÷</button>
    <button onclick="square()">x²</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('*')">×</button>
    <button onclick="sqrt()">√</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('-')">−</button>
    <button onclick="log()">log</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="append(Math.PI)">π</button>
    <button onclick="append(Math.E)">e</button>
    <button onclick="ln()">ln</button>

    <button onclick="sin()">sin</button>
    <button onclick="cos()">cos</button>
    <button onclick="tan()">tan</button>
    <button class="operator" onclick="append('+')">+</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
let display = document.getElementById("display");
let isDegree = true;

function append(value) {
  if (display.innerText === "0") display.innerText = "";
  display.innerText += value;
}

function clearDisplay() {
  display.innerText = "0";
}

function calculate() {
  try {
    display.innerText = Function('"use strict";return (' + display.innerText + ')')();
  } catch {
    display.innerText = "Error";
  }
}

function square() {
  display.innerText = Math.pow(eval(display.innerText), 2);
}

function sqrt() {
  display.innerText = Math.sqrt(eval(display.innerText));
}

function log() {
  display.innerText = Math.log10(eval(display.innerText));
}

function ln() {
  display.innerText = Math.log(eval(display.innerText));
}

function toRadians(val) {
  return isDegree ? val * Math.PI / 180 : val;
}

function sin() {
  display.innerText = Math.sin(toRadians(eval(display.innerText)));
}

function cos() {
  display.innerText = Math.cos(toRadians(eval(display.innerText)));
}

function tan() {
  display.innerText = Math.tan(toRadians(eval(display.innerText)));
}

function toggleMode() {
  isDegree = !isDegree;
  document.getElementById("mode").innerText = isDegree ? "DEG" : "RAD";
}
</script>

</body>
</html>
