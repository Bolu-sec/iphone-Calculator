<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
<style>
body{background:black;display:flex;justify-content:center;align-items:center;height:100vh;}
.calculator{width:220px;}
#display{color:white;font-size:30px;text-align:right;padding:10px;}
button{width:50px;height:50px;margin:2px;font-size:18px;border:none;border-radius:50%;}
.gray{background:#aaa;}
.dark{background:#333;color:white;}
.orange{background:orange;color:white;}
.zero{width:104px;border-radius:25px;}
</style>
</head>

<body>
<div class="calculator">
<div id="display">0</div>

<button class="gray" onclick="clr()">C</button>
<button class="gray" onclick="add('%')">%</button>
<button class="gray" onclick="add('/')">÷</button>
<button class="orange" onclick="add('*')">×</button><br>

<button class="dark" onclick="add('7')">7</button>
<button class="dark" onclick="add('8')">8</button>
<button class="dark" onclick="add('9')">9</button>
<button class="orange" onclick="add('-')">−</button><br>

<button class="dark" onclick="add('4')">4</button>
<button class="dark" onclick="add('5')">5</button>
<button class="dark" onclick="add('6')">6</button>
<button class="orange" onclick="add('+')">+</button><br>

<button class="dark" onclick="add('1')">1</button>
<button class="dark" onclick="add('2')">2</button>
<button class="dark" onclick="add('3')">3</button>
<button class="orange" onclick="calc()">=</button><br>

<button class="dark zero" onclick="add('0')">0</button>
<button class="dark" onclick="add('.')">.</button>
</div>

<script>
let d=document.getElementById("display");

function add(v){
  d.innerText=(d.innerText=="0")?v:d.innerText+v;
}
function clr(){
  d.innerText="0";
}
function calc(){
  try{ d.innerText=eval(d.innerText); }
  catch{ d.innerText="Error"; }
}
</script>
</body>
</html>
